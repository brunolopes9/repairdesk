name: Deploy staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}
  IMAGE_TAG: staging-${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/src/RepairDesk.API/Dockerfile
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/repairdesk-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/repairdesk-api:staging

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/repairdesk-web:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/repairdesk-web:staging

  check-staging-config:
    name: Check staging secrets configured
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        shell: bash
        run: |
          if [ -n "$STAGING_SSH_HOST" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Staging deploy ready (SSH secrets configured)."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Staging deploy skipped — no STAGING_SSH_HOST secret. Configure repo Settings → Secrets to enable."
          fi

  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-and-push, check-staging-config]
    if: needs.check-staging-config.outputs.ready == 'true'
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REGISTRY: ${{ env.REGISTRY }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          envs: GHCR_USERNAME,GHCR_TOKEN,IMAGE_NAMESPACE,IMAGE_TAG,REGISTRY,DEPLOY_PATH
          script: |
            set -eu
            cd "$DEPLOY_PATH"
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin
            fi
            export IMAGE_NAMESPACE IMAGE_TAG REGISTRY
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: Smoke test
        shell: bash
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          set -euo pipefail
          curl --fail --show-error --retry 10 --retry-delay 6 --retry-connrefused "$STAGING_API_URL/api/health/ready"

      - name: Optional Discord notification
        if: always()
        env:
          WEBHOOK: ${{ secrets.STAGING_DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          SHA: ${{ needs.build-and-push.outputs.short_sha }}
        shell: bash
        run: |
          if [ -z "${WEBHOOK:-}" ]; then
            exit 0
          fi
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"RepairDesk staging deploy ${STATUS}: ${SHA}\"}" \
            "$WEBHOOK"
