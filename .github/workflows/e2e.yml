name: E2E Playwright

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'e2e/**'
      - 'docker-compose.yml'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  E2E_API_KEY: repairdesk-e2e-ci

jobs:
  playwright:
    name: Core flows
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start RepairDesk stack
        env:
          E2E_ENABLED: 'true'
          E2E_USE_MOLONI_STUB: 'true'
          E2E_API_KEY: ${{ env.E2E_API_KEY }}
        run: docker compose up -d --build db cache api web

      - name: Run Playwright tests
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost
          E2E_API_URL: http://localhost:5080/api
          E2E_API_KEY: ${{ env.E2E_API_KEY }}
          E2E_ADMIN_EMAIL: bruno.miguel.martins.lopes@gmail.com
          E2E_ADMIN_PASSWORD: ChangeMe!2026
        run: npm test

      - name: Capture docker logs
        if: always()
        run: |
          mkdir -p e2e/test-results
          docker compose logs --no-color db cache api web > e2e/test-results/docker-compose.log

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: ignore

      - name: Stop RepairDesk stack
        if: always()
        run: docker compose down -v
