name: repairdesk

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: ${MSSQL_PID:-Express}
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD:?DB_SA_PASSWORD is required}
    volumes:
      - db_data:/var/opt/mssql
      - backups_data:/backups
    networks:
      - repairdesk-private
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - cache_data:/data
    networks:
      - repairdesk-private
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/repairdesk-api:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=db,1433;Database=${DB_NAME:-RepairDesk};User Id=sa;Password=${DB_SA_PASSWORD:?DB_SA_PASSWORD is required};TrustServerCertificate=True;Encrypt=True;
      Redis__Connection: cache:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      Jwt__Issuer: ${JWT_ISSUER:?JWT_ISSUER is required}
      Jwt__Audience: ${JWT_AUDIENCE:?JWT_AUDIENCE is required}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY is required}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:?SEED_ADMIN_EMAIL is required}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
      Seed__AdminDisplayName: ${SEED_ADMIN_DISPLAY_NAME:-RepairDesk Admin}
      Storage__Provider: ${Storage__Provider:-local}
      Storage__LocalRoot: ${Storage__LocalRoot:-/data/photos}
      Storage__R2__AccountId: ${Storage__R2__AccountId:-}
      Storage__R2__AccessKey: ${Storage__R2__AccessKey:-}
      Storage__R2__Secret: ${Storage__R2__Secret:-}
      Storage__R2__Bucket: ${Storage__R2__Bucket:-}
      Metrics__Enabled: ${Metrics__Enabled:-false}
      Metrics__AllowedIps__0: ${Metrics__AllowedIps__0:-127.0.0.1}
      Metrics__BasicAuthUsername: ${Metrics__BasicAuthUsername:-}
      Metrics__BasicAuthPassword: ${Metrics__BasicAuthPassword:-}
      Backup__Enabled: ${Backup__Enabled:-true}
      Backup__CronSchedule: ${Backup__CronSchedule:-03:00}
      Backup__RetentionDays: ${Backup__RetentionDays:-30}
      Backup__LocalPath: ${Backup__LocalPath:-/backups}
      Backup__DatabaseName: ${Backup__DatabaseName:-RepairDesk}
      Backup__R2__Bucket: ${Backup__R2__Bucket:?Backup__R2__Bucket is required}
      Backup__R2__Prefix: ${Backup__R2__Prefix:-backups}
      # Sprint 352 (Doc 76): dp-keys backup off-VPS. Reutiliza credenciais R2 do backup
      # SQL — pode partilhar mesmo bucket (key prefix separado: dp-keys/yyyy/MM/...) ou
      # diferente. Password Bruno guarda em 1Password — sem ela, dp-keys backup é inútil.
      DpKeysBackup__Enabled: ${DPKEYS_BACKUP_ENABLED:-true}
      DpKeysBackup__KeysPath: ${DPKEYS_BACKUP_KEYS_PATH:-/data/dp-keys}
      DpKeysBackup__CronSchedule: ${DPKEYS_BACKUP_CRON:-03:30}
      DpKeysBackup__Password: ${DPKEYS_BACKUP_PASSWORD:?DPKEYS_BACKUP_PASSWORD is required (min 16 chars)}
      DpKeysBackup__R2__AccountId: ${Storage__R2__AccountId:-}
      DpKeysBackup__R2__AccessKey: ${Storage__R2__AccessKey:-}
      DpKeysBackup__R2__Secret: ${Storage__R2__Secret:-}
      DpKeysBackup__R2__Bucket: ${DPKEYS_BACKUP_R2_BUCKET:-${Backup__R2__Bucket}}
      DpKeysBackup__R2__Prefix: ${DPKEYS_BACKUP_R2_PREFIX:-}
      # Sprint 168: chave Anthropic central (LopesTech) para IA partilhada. Tenants
      # Free/Pro usam esta key, Enterprise usam BYOK em /definicoes/ia.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AtNifLookup__Production: ${AT_PRODUCTION:-true}
      AtNifLookup__CertPath: ${AT_CERT_PATH:-}
      AtNifLookup__KeyPath: ${AT_KEY_PATH:-}
      AtNifLookup__KeyPassword: ${AT_KEY_PASSWORD:-}
      AtNifLookup__MaxDailyCallsPerTenant: ${AT_NIF_MAX_DAILY_CALLS:-100}
      # Sprint 250 (Doc 75): Sentry error tracking. Sem SENTRY_DSN o SDK é no-op.
      # Cria projecto em sentry.io (free tier 5k events/mês cobre LopesTech easily).
      Sentry__Dsn: ${SENTRY_DSN:-}
      # Cors: lista de origens permitidas em produção. Apertado em Sprint 249.
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_PRIMARY:-https://app.mender.pt}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL:-https://app.mender.pt}
    volumes:
      - photos_data:/data/photos
      # DataProtection keys (cifram tokens Moloni, refresh tokens). Volume persistente — critico.
      - dp_keys:/data/dp-keys
      - backups_data:/backups
      - ${AT_SECRETS_HOST_PATH:-/opt/repairdesk/secrets/at}:/run/secrets/at:ro
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - repairdesk-private
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/api/health/ready > /dev/null && curl --fail --silent http://localhost:8080/api/health/backup > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/repairdesk-web:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-127.0.0.1:8088}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - repairdesk-private
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  db_data:
  cache_data:
  photos_data:
  backups_data:
  dp_keys:

networks:
  repairdesk-private:
    driver: bridge
