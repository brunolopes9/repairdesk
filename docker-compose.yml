name: repairdesk

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: repairdesk-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD:-Repair!Desk2026}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
    networks:
      - repairdesk-net
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cache:
    image: redis:7-alpine
    container_name: repairdesk-cache
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - cache_data:/data
    networks:
      - repairdesk-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: src/RepairDesk.API/Dockerfile
    container_name: repairdesk-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=db,1433;Database=RepairDesk;User Id=sa;Password=${DB_SA_PASSWORD:-Repair!Desk2026};TrustServerCertificate=True;
      Redis__Connection: cache:6379
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - repairdesk-net

volumes:
  db_data:
  cache_data:

networks:
  repairdesk-net:
    driver: bridge
