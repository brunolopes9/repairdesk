name: repairdesk

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: repairdesk-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD:-Repair!Desk2026}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
      # Backups em bind mount: ficheiros .bak ficam em ./backups/ no host
      # (fora do Docker) — sobrevivem mesmo a 'docker compose down -v'.
      - ./backups:/backups
    networks:
      - repairdesk-net
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cache:
    image: redis:7-alpine
    container_name: repairdesk-cache
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - cache_data:/data
    networks:
      - repairdesk-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: src/RepairDesk.API/Dockerfile
    container_name: repairdesk-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=db,1433;Database=RepairDesk;User Id=sa;Password=${DB_SA_PASSWORD:-Repair!Desk2026};TrustServerCertificate=True;Encrypt=False;
      Redis__Connection: cache:6379
      Jwt__Issuer: ${JWT_ISSUER:-repairdesk-local}
      Jwt__Audience: ${JWT_AUDIENCE:-repairdesk-local}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-replace-this-key-at-least-32-chars-long-please-please-please}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-bruno.miguel.martins.lopes@gmail.com}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:-ChangeMe!2026}
      Seed__AdminDisplayName: ${SEED_ADMIN_DISPLAY_NAME:-Bruno Lopes}
      Storage__Provider: ${Storage__Provider:-local}
      Storage__LocalRoot: ${Storage__LocalRoot:-/data/photos}
      Storage__R2__AccountId: ${Storage__R2__AccountId:-}
      Storage__R2__AccessKey: ${Storage__R2__AccessKey:-}
      Storage__R2__Secret: ${Storage__R2__Secret:-}
      Storage__R2__Bucket: ${Storage__R2__Bucket:-}
      Metrics__Enabled: ${Metrics__Enabled:-false}
      Metrics__AllowedIps__0: ${Metrics__AllowedIps__0:-127.0.0.1}
      Metrics__BasicAuthUsername: ${Metrics__BasicAuthUsername:-}
      Metrics__BasicAuthPassword: ${Metrics__BasicAuthPassword:-}
      Backup__Enabled: ${Backup__Enabled:-false}
      Backup__CronSchedule: ${Backup__CronSchedule:-03:00}
      Backup__RetentionDays: ${Backup__RetentionDays:-30}
      Backup__LocalPath: ${Backup__LocalPath:-/backups}
      Backup__DatabaseName: ${Backup__DatabaseName:-RepairDesk}
      Backup__R2__Bucket: ${Backup__R2__Bucket:-}
      Backup__R2__Prefix: ${Backup__R2__Prefix:-backups}
      AtNifLookup__Production: ${AT_PRODUCTION:-false}
      AtNifLookup__CertPath: ${AT_CERT_PATH:-}
      AtNifLookup__KeyPath: ${AT_KEY_PATH:-}
      AtNifLookup__KeyPassword: ${AT_KEY_PASSWORD:-}
      AtNifLookup__MaxDailyCallsPerTenant: ${AT_NIF_MAX_DAILY_CALLS:-100}
    ports:
      - "5080:8080"
    volumes:
      - photos_data:/data/photos
      # DataProtection keys (cifram tokens Moloni, refresh tokens, etc).
      # Bind mount em ./data/dp-keys para sobreviverem a 'docker compose down -v' tambem.
      # CRITICO: sem isto, rebuilds perdem as keys e os secrets em DB tornam-se ilegiveis.
      - ./data/dp-keys:/data/dp-keys
      - ${AT_SECRETS_HOST_PATH:-./secrets/at}:/run/secrets/at:ro
      # Backups em bind mount: ficheiros .bak ficam em ./backups/ no host
      # (fora do Docker) — sobrevivem mesmo a 'docker compose down -v'.
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - repairdesk-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/api/health/ready > /dev/null && curl --fail --silent http://localhost:8080/api/health/backup > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repairdesk-web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - repairdesk-net

volumes:
  db_data:
  cache_data:
  photos_data:

networks:
  repairdesk-net:
    driver: bridge
